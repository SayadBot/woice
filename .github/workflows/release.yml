name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            target: x86_64-pc-windows-msvc
            runs-on: windows-latest
          - platform: windows
            target: aarch64-pc-windows-msvc
            runs-on: windows-latest
          - platform: macos
            target: aarch64-apple-darwin
            runs-on: macos-latest
          - platform: macos
            target: x86_64-apple-darwin
            runs-on: macos-latest

    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (macOS only)
        if: matrix.platform == 'macos'
        run: brew install libomp

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Woice ${{ github.ref_name }}'
          releaseBody: |
            ## Installation

            - **Windows x64**: Download the `.msi` or `.exe` installer
            - **Windows ARM64**: Download the `.msi` or `.exe` installer ending with `_aarch64`
            - **macOS Apple Silicon**: Download the `.dmg` file ending with `_aarch64`
            - **macOS Intel**: Download the `.dmg` file ending with `_x86_64`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
